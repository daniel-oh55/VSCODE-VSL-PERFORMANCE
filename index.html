<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SHIP PERFORMANCE ANALYZER - PRO v15</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --v1-blue: #3498db;
            --v2-gold: #f39c12;
            --bg: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            --text: #e1e4e8;
        }

        body { 
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif; 
            background: var(--bg); background-attachment: fixed; margin: 0; padding: 25px; color: var(--text); min-height: 100vh;
        }
        
        header { text-align: center; margin-bottom: 20px; }
        header h1 { font-size: 32px; font-weight: 900; color: #ffffff; text-shadow: 0 0 20px rgba(52, 152, 219, 0.5); }

        .global-toolbar {
            display: flex; justify-content: center; align-items: center; gap: 20px; margin: 0 auto 30px auto; width: fit-content;
            background: rgba(255, 255, 255, 0.08); padding: 15px 30px; border-radius: 50px; backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .global-toolbar select { padding: 8px 15px; border-radius: 8px; color: white; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); font-weight: 800; }

        .dashboard-container { display: flex; gap: 20px; justify-content: center; width: 100%; max-width: 1000px; margin: 0 auto; }
        .vessel-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border-radius: 24px; padding: 25px; flex: 1; min-width: 520px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .vessel-card.v1 { border-top: 2px solid var(--v1-blue); }
        .vessel-card.v2 { border-top: 2px solid var(--v2-gold); }

        .lookup-row { display: flex; gap: 15px; background: rgba(0, 0, 0, 0.3); padding: 18px; border-radius: 12px; margin-bottom: 20px; }
        .field { flex: 1; display: flex; flex-direction: column; }
        .field label { font-size: 11px; color: #95a5a6; margin-bottom: 8px; text-transform: uppercase; }
        input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; padding: 12px; color: white; }

        .calc-btn { width: 100%; padding: 14px; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 800; text-transform: uppercase; margin-bottom: 15px; }
        .v1 .calc-btn { background: var(--v1-blue); }
        .v2 .calc-btn { background: var(--v2-gold); }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); color: white; text-transform: uppercase; }
        td { padding: 10px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); color: rgba(255,255,255,0.8); font-family: 'JetBrains Mono'; }
        .total-cell { font-weight: 800; color: var(--v1-blue); }
        .v2 .total-cell { color: var(--v2-gold); }

        .chart-container { background: rgba(255, 255, 255, 0.03); padding: 30px; border-radius: 24px; margin: 40px auto; max-width: 1000px; height: 400px; }

        .hidden { display: none !important; }
        .auth-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); padding: 40px; border-radius: 30px; text-align: center; width: 100%; max-width: 400px; margin: 15vh auto; border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-login-gradient { background: linear-gradient(90deg, #3498db, #f39c12); color: white; width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

<div id="sec-login" class="auth-card">
    <div style="font-size: 50px; margin-bottom: 15px;">🛡️</div>
    <h2>SYSTEM ACCESS</h2>
    <p style="color: gray; font-size: 12px; letter-spacing: 2px; margin-bottom: 30px;">SHIP PERFORMANCE ANALYZER</p>
    <input type="email" id="auth-email" class="auth-input" placeholder="이메일을 입력하세요" style="width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 10px; box-sizing: border-box;" onkeyup="if(window.event.keyCode==13){handleAuth()}">
    <button class="btn-login-gradient" onclick="handleAuth()">LOGIN</button>
</div>

<div id="sec-dashboard" class="hidden">
    <header><h1>SHIP PERFORMANCE ANALYZER</h1></header>
    <div class="global-toolbar">
        <span>SPEED RANGE</span>
        <select id="global_spd_min" onchange="refreshTables()"></select> ~ <select id="global_spd_max" onchange="refreshTables()"></select>
    </div>

    <div class="dashboard-container">
        <section class="vessel-card v1">
            <span style="color: var(--v1-blue); font-weight: 900; font-size: 18px; display: block; margin-bottom: 15px;">VESSEL 1</span>
            <div class="lookup-row">
                <div class="field"><label>CODE</label><input type="text" id="vsl1_code" placeholder="예: AKTR" onkeyup="checkEnter(event, 1)"></div>
                <div class="field"><label>NAME</label><input type="text" id="vsl1_name" readonly></div>
            </div>
            <div class="condition-grid">
                <div class="field"><label>R/H Range</label><div><input type="number" id="vsl1_rh_min" value="23" style="width: 60px;"> ~ <input type="number" id="vsl1_rh_max" value="25" style="width: 60px;"></div></div>
            </div>
            <button class="calc-btn" onclick="runAnalysis(1)">SEARCH 1</button>
            <table><thead><tr><th>SPD</th><th>RPM</th><th>FO</th><th>MGO</th><th>TOTAL</th></tr></thead><tbody id="vsl1_table"></tbody></table>
        </section>

        <section class="vessel-card v2">
            <span style="color: var(--v2-gold); font-weight: 900; font-size: 18px; display: block; margin-bottom: 15px;">VESSEL 2</span>
            <div class="lookup-row">
                <div class="field"><label>CODE</label><input type="text" id="vsl2_code" placeholder="예: MEBG" onkeyup="checkEnter(event, 2)"></div>
                <div class="field"><label>NAME</label><input type="text" id="vsl2_name" readonly></div>
            </div>
            <div class="condition-grid">
                <div class="field"><label>R/H Range</label><div><input type="number" id="vsl2_rh_min" value="23" style="width: 60px;"> ~ <input type="number" id="vsl2_rh_max" value="25" style="width: 60px;"></div></div>
            </div>
            <button class="calc-btn" onclick="runAnalysis(2)">SEARCH 2</button>
            <table><thead><tr><th>SPD</th><th>RPM</th><th>FO</th><th>MGO</th><th>TOTAL</th></tr></thead><tbody id="vsl2_table"></tbody></table>
        </section>
    </div>

    <div class="chart-container"><canvas id="performanceChart"></canvas></div>
</div>

<script>
// --- Supabase 설정 ---
const SUPABASE_URL = 'https://hihplowwftsezsvewkcq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpaHBsb3d3ZnRzZXpzdmV3a2NxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MzIxNTUsImV4cCI6MjA5MjUwODE1NX0.Tk6P9zWFwhe0bcFUISE4ILZxxvp9rhrZi8UaNl4SY3I'; 
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// --- 인증 시스템 ---
const ADMIN_KEYS = ['admin@sinokor.co.kr', 'daniel']; 
const DEFAULT_VISITORS = ['456456', 'daniel@sinokor.co.kr', 'skhwang@sinokor.co.kr', 'andalucia@sinokor.co.kr'];
let whitelist = [...new Set([...DEFAULT_VISITORS])];

function handleAuth() {
    const input = document.getElementById('auth-email').value.trim().toLowerCase();
    if (ADMIN_KEYS.includes(input) || whitelist.includes(input)) {
        document.getElementById('sec-login').classList.add('hidden');
        document.getElementById('sec-dashboard').classList.remove('hidden');
        initAnalyzer();
    } else {
        alert('❌ 권한이 없습니다.');
    }
}

// --- 분석 엔진 ---
let shipDB = [], voyageDB = [], myChart;
let v1Data = [], v2Data = [];

async function initAnalyzer() {
    const minSel = document.getElementById('global_spd_min');
    if (minSel.options.length > 0) return;

    initToolbar();
    initChart();

    try {
        console.log("데이터 로딩 중...");
        // [수정] Supabase에서 직접 데이터 가져오기
        const { data: vslData } = await _supabase.from('VESSEL_DATA').select('*');
        const { data: voyData } = await _supabase.from('VOY_DATA').select('*');
        
        shipDB = vslData || [];
        voyageDB = voyData || [];
        
        console.log(`로딩 완료: 선박 ${shipDB.length}척, 운항기록 ${voyageDB.length}건`);
        refreshTables();
    } catch (e) { console.error("로딩 실패:", e); }
}

function initToolbar() {
    const minSel = document.getElementById('global_spd_min');
    const maxSel = document.getElementById('global_spd_max');
    for (let i = 5; i <= 25; i++) {
        minSel.add(new Option(i, i)); maxSel.add(new Option(i, i));
    }
    minSel.value = 12; maxSel.value = 18;
}

function checkEnter(e, n) { if (e.key === 'Enter') runAnalysis(n); else handleSearch(n); }

function handleSearch(num) {
    const code = document.getElementById(`vsl${num}_code`).value.trim().toUpperCase();
    const ship = shipDB.find(s => s.VSL_CODE === code);
    document.getElementById(`vsl${num}_name`).value = ship ? ship.VSL_NAME : "";
}

function runAnalysis(num) {
    const code = document.getElementById(`vsl${num}_code`).value.trim().toUpperCase();
    const rhMin = parseFloat(document.getElementById(`vsl${num}_rh_min`).value);
    const rhMax = parseFloat(document.getElementById(`vsl${num}_rh_max`).value);
    const minSpd = parseInt(document.getElementById('global_spd_min').value);
    const maxSpd = parseInt(document.getElementById('global_spd_max').value);
    
    const tableBody = document.getElementById(`vsl${num}_table`);
    tableBody.innerHTML = "";

    // [수정] Supabase 컬럼명(대문자)에 맞춰 필터링
    const filtered = voyageDB.filter(d => 
        d.VSL_CODE === code && d.RUNNING_HOURS >= rhMin && d.RUNNING_HOURS <= rhMax
    );

    let currentGraphData = [];
    for (let spd = maxSpd; spd >= minSpd; spd--) {
        const group = filtered.filter(d => Math.round(d.AVG_SPD || 0) === spd);
        let res = { rpm: "-", fo: 0, mgo: 0, total: "0.0" };

        if (group.length > 0) {
            const count = group.length;
            res.rpm = (group.reduce((s, c) => s + (c.RPM || 0), 0) / count).toFixed(1);
            
            const sumNorm = (key) => group.reduce((s, row) => {
                const v = row[key] || 0;
                const rh = row.RUNNING_HOURS || 0;
                return s + ((rh > 0) ? (v / rh) * 24 : 0);
            }, 0);

            res.fo = (sumNorm("CONS_IFO") / count).toFixed(1);
            res.mgo = (sumNorm("CONS_MGO") / count).toFixed(1);
            res.total = (parseFloat(res.fo) + parseFloat(res.mgo)).toFixed(1);
            currentGraphData.push({x: spd, y: parseFloat(res.total)});
        } else {
            currentGraphData.push({x: spd, y: null});
        }
        tableBody.innerHTML += `<tr><td>${spd}</td><td>${res.rpm}</td><td>${res.fo}</td><td>${res.mgo}</td><td class="total-cell">${res.total}</td></tr>`;
    }
    if (num === 1) v1Data = currentGraphData.sort((a,b) => a.x - b.x);
    else v2Data = currentGraphData.sort((a,b) => a.x - b.x);
    updateChart();
}

function refreshTables() { [1, 2].forEach(n => drawEmptyTable(n)); }
function drawEmptyTable(num) {
    const minSpd = parseInt(document.getElementById('global_spd_min').value);
    const maxSpd = parseInt(document.getElementById('global_spd_max').value);
    const body = document.getElementById(`vsl${num}_table`);
    body.innerHTML = "";
    for (let spd = maxSpd; spd >= minSpd; spd--) body.innerHTML += `<tr><td>${spd}</td><td>-</td><td>-</td><td>-</td><td>-</td></tr>`;
}

function initChart() {
    const ctx = document.getElementById('performanceChart').getContext('2d');
    myChart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [
            { label: 'Vessel 1 Cons.', borderColor: '#3498db', data: [], tension: 0.4 },
            { label: 'Vessel 2 Cons.', borderColor: '#f39c12', data: [], tension: 0.4 }
        ]},
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: false, ticks: { color: 'white' } }, x: { ticks: { color: 'white' } } }, plugins: { legend: { labels: { color: 'white' } } } }
    });
}

function updateChart() {
    if (!myChart) return;
    const minSpd = parseInt(document.getElementById('global_spd_min').value);
    const maxSpd = parseInt(document.getElementById('global_spd_max').value);
    let labels = [];
    for(let i = minSpd; i <= maxSpd; i++) labels.push(i);
    myChart.data.labels = labels;
    myChart.data.datasets[0].data = labels.map(s => { let f = v1Data.find(d => d.x === s); return f ? f.y : null; });
    myChart.data.datasets[1].data = labels.map(s => { let f = v2Data.find(d => d.x === s); return f ? f.y : null; });
    myChart.update();
}
</script>
</body>
</html>
