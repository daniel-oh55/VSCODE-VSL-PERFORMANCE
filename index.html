const ADMIN_KEYS = ['admin@sinokor.co.kr', 'daniel']; 
const DEFAULT_VISITORS = ['456456', 'daniel@sinokor.co.kr', 'skhwang@sinokor.co.kr', 'andalucia@sinokor.co.kr', 'wtlee@sinokor.co.kr', 'sjunkim@heungaline.com', 'cys33@sinokor.co.kr', 'geonwook.kim@sinokor.co.kr ', 'bslee@sinokor.co.kr', 'mjchang@sinokor.co.kr', 'ijryu@sinokor.co.kr', 'kimmc@sinokor.co.kr', 'shjung@sinokor.co.kr', 'smmoon@heungaline.com', 'friend@sinokor.co.kr', 'binlee@heungaline.com', 'ghl@sinokor.co.kr', 'jaehkim@sinokor.co.kr', 'hwkang2@sinokor.co.kr'];

function handleAuth() {
    const inputField = document.getElementById('auth-email');

    if (!input) { alert('이메일을 입력해주세요.'); return; }

    } else { alert('❌ 권한이 없습니다.'); }

    document.getElementById('sec-admin-menu').classList.add('hidden');
    document.getElementById('sec-dashboard').classList.remove('hidden');
    initAnalyzer();

// 4. 데이터 분석 엔진 (여기서부터가 핵심 수정본입니다!) [cite: 306-340]
let shipDB = [], voyageDB = [], myChart;
let v1Data = [], v2Data = [];

async function initAnalyzer() {
    const minSel = document.getElementById('global_spd_min');
    if (minSel.options.length > 0) return; // 중복 실행 방지

    initToolbar();
    initChart();

    try {
        console.log("Supabase에서 데이터를 불러오는 중...");
        const [shipsRes, voyageRes] = await Promise.all([
    _supabase.from('VESSEL_DATA').select('*'),
    _supabase.from('VOY_DATA').select('*').range(0, 60000) 
]);

        if (shipsRes.error) throw shipsRes.error;
        if (voyageRes.error) throw voyageRes.error;

        shipDB = shipsRes.data;
        voyageDB = voyageRes.data;

        console.log(`로딩 완료: 선박 ${shipDB.length}척, 기록 ${voyageDB.length}건`);
        refreshTables();
    } catch (e) {
        console.error("데이터 로딩 실패:", e.message);
    }
}

    const code = document.getElementById(`vsl${num}_code`).value.trim().toUpperCase();
    const ship = shipDB.find(s => s.VSL_CODE === code);
    document.getElementById(`vsl${num}_name`).value = ship ? ship.VSL_NAME : "";
}

function runAnalysis(num) {
    const code = document.getElementById(`vsl${num}_code`).value.trim().toUpperCase();
    const rhMin = parseFloat(document.getElementById(`vsl${num}_rh_min`).value);
    const rhMax = parseFloat(document.getElementById(`vsl${num}_rh_max`).value);
    const slipMin = parseFloat(document.getElementById(`vsl${num}_slip_min`).value);
    const slipMax = parseFloat(document.getElementById(`vsl${num}_slip_max`).value);
    const minSpd = parseInt(document.getElementById('global_spd_min').value);
    const maxSpd = parseInt(document.getElementById('global_spd_max').value);
    
    const tableBody = document.getElementById(`vsl${num}_table`);
    tableBody.innerHTML = "";

    const filtered = voyageDB.filter(d => {
        const dCode = (d.VSL_CODE || "").toString().toUpperCase();
        const dRH = parseFloat(d.RUNNING_HOURS) || 0;
        const dSlip = parseFloat(d.SLIP) || 0;
        return dCode === code && dRH >= rhMin && dRH <= rhMax && dSlip >= slipMin && dSlip <= slipMax;
    });

    let currentGraphData = [];
    for (let spd = maxSpd; spd >= minSpd; spd--) {
        const group = filtered.filter(d => Math.round(d.AVG_SPD || 0) === spd);
        let res = { rpm: "-", fo: 0, mgo: 0, total: "0.0" };

        if (group.length > 0) {
            const count = group.length;
            res.rpm = (group.reduce((s, c) => s + (parseFloat(c.RPM) || 0), 0) / count).toFixed(1);
            
            const sumNorm = (key) => group.reduce((s, row) => {
                const v = parseFloat(row[key]) || 0;
                const rh = parseFloat(row.RUNNING_HOURS) || 0;
                return s + ((rh > 0) ? (v / rh) * 24 : 0);
            }, 0);

            res.fo = (sumNorm("CONS_IFO") / count).toFixed(1);
            res.mgo = (sumNorm("CONS_MGO") / count).toFixed(1);
            res.total = (parseFloat(res.fo) + parseFloat(res.mgo)).toFixed(1);
            currentGraphData.push({x: spd, y: parseFloat(res.total)});
        } else {
            currentGraphData.push({x: spd, y: null});
        }
        tableBody.innerHTML += `<tr><td style="font-weight:bold;">${spd}</td><td>${res.rpm}</td><td>${res.fo}</td><td>${res.mgo}</td><td class="total-cell">${res.total}</td></tr>`;
    }
    
    if (num === 1) v1Data = currentGraphData.sort((a,b) => a.x - b.x);
    else v2Data = currentGraphData.sort((a,b) => a.x - b.x);
    updateChart();
}

// 1. 툴바 초기화: 스피드 선택 드롭다운 생성 [cite: 312-315]
        function initToolbar() {
            const minSel = document.getElementById('global_spd_min');
            const maxSel = document.getElementById('global_spd_max');
            if (!minSel || !maxSel) return;
            
            for (let i = 5; i <= 25; i++) {
                minSel.add(new Option(i, i));
                maxSel.add(new Option(i, i));
            }
            minSel.value = 12;
            maxSel.value = 18;
        }

// 엔터키를 눌렀을 때 분석을 실행하고, 평소에는 선박명을 검색하는 도우미 함수
function checkEnter(event, num) { 
    if (event.key === 'Enter') {
        runAnalysis(num); 
    } else {
        handleSearch(num); 
    }
}

        // 2. 테이블 새로고침: 빈 표를 그리고 차트를 업데이트 [cite: 315-316]
        function refreshTables() { 
            [1, 2].forEach(n => drawEmptyTable(n)); 
            updateChart(); 
        }

        // 3. 빈 테이블 그리기: 데이터가 없을 때 기본 틀 출력 [cite: 340-343]
        function drawEmptyTable(num) {
            const minSpd = parseInt(document.getElementById('global_spd_min').value);
            const maxSpd = parseInt(document.getElementById('global_spd_max').value);
            const body = document.getElementById(`vsl${num}_table`);
            if (!body) return;
            
            body.innerHTML = "";
            for (let spd = maxSpd; spd >= minSpd; spd--) {
                body.innerHTML += `<tr><td style="font-weight:bold;">${spd}</td><td>-</td><td>-</td><td>-</td><td>-</td></tr>`;
            }
        }

        // 4. 차트 초기화: Chart.js 객체 생성 [cite: 343-355]
        function initChart() {
            const canvas = document.getElementById('performanceChart');
            if (!canvas) return; 
            const ctx = canvas.getContext('2d');

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        { 
                            label: 'Vessel 1 Total Cons.', 
                            borderColor: '#3498db', 
                            borderWidth: 3,
                            data: [], 
                            tension: 0.4,
                            fill: false
                        },
                        { 
                            label: 'Vessel 2 Total Cons.', 
                            borderColor: '#f39c12', 
                            borderWidth: 3,
                            data: [], 
                            tension: 0.4, 
                            fill: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#ffffff' } } },
                    scales: {
                        y: { grid: { color: 'rgba(255, 255, 255, 0.1)' }, ticks: { color: '#aaaaaa' } },
                        x: { grid: { display: false }, ticks: { color: '#aaaaaa' } }
                    }
                }
            });
        }

        // 5. 차트 업데이트: 계산된 데이터를 선으로 연결 [cite: 355-359]
        function updateChart() {
            if (!myChart) return;

            const minSpd = parseInt(document.getElementById('global_spd_min').value);
            const maxSpd = parseInt(document.getElementById('global_spd_max').value);
            
            let labels = [];
            for(let i = minSpd; i <= maxSpd; i++) labels.push(i);
            myChart.data.labels = labels;
            
            // Vessel 1 데이터 매핑
            myChart.data.datasets[0].data = labels.map(spd => { 
                let found = v1Data.find(d => d.x === spd); 
                return found ? found.y : null; 
            });

            // Vessel 2 데이터 매핑
            myChart.data.datasets[1].data = labels.map(spd => { 
                let found = v2Data.find(d => d.x === spd); 
                return found ? found.y : null; 
            });
            
            myChart.update();
        }
// [이미지: 클라이언트-서버 데이터 흐름도]
